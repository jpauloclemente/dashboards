<script>
  const $  = s => document.querySelector(s);
  const $$ = s => Array.from(document.querySelectorAll(s));

  function seats(plan){ return $$('.seat' + (plan ? '[data-plan="'+plan+'"]' : '')); }
  function occ(plan){ return seats(plan).filter(s => s.classList.contains('oc')); }

  const STORAGE_KEY = 'seutrem_reservas_copa29jun_v2';

  function saveState(){
    const occupied = seats().filter(s=>s.classList.contains('oc')).map(s=>s.dataset.name);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(occupied));
  }

  function loadState(){
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if(saved){
        // Tem estado salvo: aplica ele (sobrescreve o hardcoded)
        const occupied = JSON.parse(saved);
        seats().forEach(s => {
          if(occupied.includes(s.dataset.name)){
            s.classList.add('oc');
          } else {
            s.classList.remove('oc');
          }
        });
      }
      // Se não tem nada salvo: mantém o estado hardcoded do HTML
    } catch(e){}
  }

  function toggleSeat(el){
    el.classList.toggle('oc');
    saveState();
    updateUI();
  }

  function renderList(id, plan){
    const box = $(id);
    const list = occ(plan).map(s => s.dataset.name).sort();
    if(!list.length){ box.innerHTML = '<span class="empty">Nenhum lugar ocupado</span>'; return; }
    box.innerHTML = list.map(n => '<span class="pill">'+n+'</span>').join('');
  }

  function updateUI(){
    const total = seats().length;
    const ocup  = occ().length;
    $('#cTotal').textContent = total;
    $('#cOcc').textContent   = ocup;
    $('#cAvail').textContent = total - ocup;
    renderList('#listInterna','interna');
    renderList('#listExterna','externa');
  }

  function resetAll(){
    if(occ().length && !confirm('Liberar TODOS os lugares das duas áreas?')) return;
    seats().forEach(s => s.classList.remove('oc'));
    localStorage.removeItem(STORAGE_KEY);
    updateUI();
  }

  function statusText(){
    const ti = seats('interna').length, oi = occ('interna');
    const te = seats('externa').length, oe = occ('externa');
    const total = ti+te, ocupT = oi.length+oe.length;
    const fmt = a => a.length ? a.map(s=>s.dataset.name).sort().join(', ') : '—';
    return (
      '🏠 INTERNO ('+oi.length+'/'+ti+' ocupados)\n'+
      'Ocupados: '+fmt(oi)+'\n\n'+
      '🌿 EXTERNO ('+oe.length+'/'+te+' ocupados)\n'+
      'Ocupados: '+fmt(oe)+'\n\n'+
      'Total: '+ocupT+'/'+total+' ocupados | '+(total-ocupT)+' disponíveis'
    );
  }

  function showToast(){
    const t = $('#toast'); t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 2200);
  }

  function copyStatus(){
    const txt = statusText();
    if(navigator.clipboard && window.isSecureContext){
      navigator.clipboard.writeText(txt).then(showToast).catch(()=>fallbackCopy(txt));
    } else { fallbackCopy(txt); }
  }
  function fallbackCopy(txt){
    const ta = document.createElement('textarea');
    ta.value = txt; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    try{ document.execCommand('copy'); showToast(); }
    catch(e){ alert(txt); }
    document.body.removeChild(ta);
  }

  loadState();
  updateUI();
</script>
