<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Seu Trem · Mapa de Reservas · Brasil na Copa</title>
<style>
  :root{
    --bg:#F4EFE4; --wall:#8B7355; --label:#3A2510; --accent:#C8922A;
    --av:#3d8a52; --oc:#c0392b; --hatch:#C4A882;
    --wood1:#A0522D; --wood2:#6B3A1F; --tv:#1a1a1a; --round:#222222; --road:#9E9E9E;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--label);
    font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    line-height:1.4; padding:14px 12px 60px;
  }
  .wrap{max-width:960px;margin:0 auto}

  header h1{font-size:1.15rem;margin:0 0 2px;letter-spacing:.2px}
  header .sub{font-size:.82rem;color:#6b5a45;margin:0 0 12px}
  header .accentbar{height:4px;width:54px;background:var(--accent);border-radius:3px;margin:6px 0 12px}

  /* contador */
  .counter{display:flex;gap:8px;margin-bottom:16px}
  .counter .box{
    flex:1;background:#fff;border:1px solid #e4dac4;border-radius:12px;
    padding:10px 6px;text-align:center;box-shadow:0 1px 2px rgba(60,40,16,.06)
  }
  .counter .box .num{font-size:1.5rem;font-weight:700;line-height:1}
  .counter .box .cap{font-size:.66rem;text-transform:uppercase;letter-spacing:.5px;color:#7a6a54;margin-top:4px}
  .counter .box.av .num{color:var(--av)}
  .counter .box.oc .num{color:var(--oc)}
  .counter .box.total .num{color:var(--accent)}

  .plans{display:flex;flex-wrap:wrap;gap:18px}
  .plan{flex:1 1 320px;min-width:0;background:#fff;border:1px solid #e7ddc6;border-radius:14px;
        padding:12px 12px 14px;box-shadow:0 1px 3px rgba(60,40,16,.06)}
  .plan h2{font-size:1rem;margin:0 0 8px;color:var(--label)}
  .plan svg{display:block;width:100%;height:auto;border-radius:8px;background:var(--bg);
            border:1px solid #efe6d2;touch-action:manipulation}

  /* assentos */
  .seat{cursor:pointer}
  .seat circle{fill:var(--av);stroke:#2c6b3e;stroke-width:1.5;transition:fill .12s}
  .seat.oc circle{fill:var(--oc);stroke:#8e2c20}
  .seat text{fill:#fff;font-size:13px;font-weight:700;text-anchor:middle;dominant-baseline:central;pointer-events:none}
  .seat:active circle{stroke-width:3}

  .lbl{fill:var(--label);font-size:14px;font-family:Inter,system-ui,sans-serif}
  .lbl.sm{font-size:11px;fill:#6b5a45}
  .lbl.c{text-anchor:middle}

  /* lista de ocupados */
  .occlist{margin-top:10px}
  .occlist .t{font-size:.72rem;text-transform:uppercase;letter-spacing:.5px;color:#7a6a54;margin-bottom:6px}
  .pills{display:flex;flex-wrap:wrap;gap:6px;min-height:24px}
  .pill{background:var(--oc);color:#fff;font-size:.72rem;font-weight:600;
        padding:4px 9px;border-radius:999px;white-space:nowrap}
  .empty{font-size:.78rem;color:#9a8a73;font-style:italic}

  /* botões */
  .actions{display:flex;flex-wrap:wrap;gap:10px;margin:20px 0 14px}
  button{flex:1 1 200px;font-family:inherit;font-size:.92rem;font-weight:600;
         padding:13px 14px;border-radius:12px;border:1px solid transparent;cursor:pointer}
  .btn-reset{background:#fff;color:var(--label);border-color:#d9ccae}
  .btn-reset:active{background:#f0e8d6}
  .btn-copy{background:var(--accent);color:#fff}
  .btn-copy:active{filter:brightness(.93)}

  /* legenda */
  .legend{display:flex;gap:18px;flex-wrap:wrap;font-size:.82rem;color:#5e4d38}
  .legend span{display:inline-flex;align-items:center;gap:7px}
  .dot{width:13px;height:13px;border-radius:50%;display:inline-block}
  .dot.av{background:var(--av)} .dot.oc{background:var(--oc)}

  /* toast */
  #toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);
         background:#2f6b41;color:#fff;padding:12px 18px;border-radius:10px;font-size:.88rem;
         font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,.25);opacity:0;pointer-events:none;
         transition:opacity .25s,transform .25s;z-index:50}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media(max-width:720px){
    .plans{flex-direction:column}
    .counter .box .num{font-size:1.35rem}
  }
</style>
</head>
<body>

        <g class="seat av" data-plan="externa" data-name="Mesa Puff · 1" onclick="toggleSeat(this)" transform="translate(525,932)"><circle r="16"/><text>1</text></g>
        <g class="seat av" data-plan="externa" data-name="Mesa Puff · 2" onclick="toggleSeat(this)" transform="translate(418,1040)"><circle r="16"/><text>2</text></g>
        <g class="seat av" data-plan="externa" data-name="Mesa Puff · 3" onclick="toggleSeat(this)" transform="translate(632,1040)"><circle r="16"/><text>3</text></g>
        <text class="lbl sm c" x="525" y="1135">3 banquetas</text>
      </svg>

      <div class="occlist">
        <div class="t">Ocupados — externo</div>
        <div class="pills" id="listExterna"></div>
      </div>
    </section>

  </div>

  <div class="actions">
    <button class="btn-reset" onclick="resetAll()">↺ Resetar tudo</button>
    <button class="btn-copy" onclick="copyStatus()">📋 Copiar status p/ WhatsApp</button>
  </div>

  <div class="legend">
    <span><i class="dot av"></i> Disponível</span>
    <span><i class="dot oc"></i> Ocupado</span>
  </div>

</div>

<div id="toast">Copiado para a área de transferência ✓</div>

<script>
  const $  = s => document.querySelector(s);
  const $$ = s => Array.from(document.querySelectorAll(s));

  function seats(plan){ return $$('.seat' + (plan ? '[data-plan="'+plan+'"]' : '')); }
  function occ(plan){ return seats(plan).filter(s => s.classList.contains('oc')); }

  const STORAGE_KEY = 'seutrem_reservas_copa29jun';

  function saveState(){
    const occupied = seats().filter(s=>s.classList.contains('oc')).map(s=>s.dataset.name);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(occupied));
  }

  function loadState(){
    try{
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');
      if(!Array.isArray(saved)) return;
      seats().forEach(s=>{
        if(saved.includes(s.dataset.name)) s.classList.add('oc');
      });
    }catch(e){}
  }

  function toggleSeat(el){
    el.classList.toggle('oc');
    saveState();
    updateUI();
  }

  function renderList(id, plan){
    const box = $(id);
    const list = occ(plan).map(s => s.dataset.name).sort();
    if(!list.length){ box.innerHTML = '<span class="empty">Nenhum lugar ocupado</span>'; return; }
    box.innerHTML = list.map(n => '<span class="pill">'+n+'</span>').join('');
  }

  function updateUI(){
    const total = seats().length;
    const ocup  = occ().length;
    $('#cTotal').textContent = total;
    $('#cOcc').textContent   = ocup;
    $('#cAvail').textContent = total - ocup;
    renderList('#listInterna','interna');
    renderList('#listExterna','externa');
  }

  function resetAll(){
    if(occ().length && !confirm('Liberar TODOS os lugares das duas áreas?')) return;
    seats().forEach(s => s.classList.remove('oc'));
    localStorage.removeItem(STORAGE_KEY);
    updateUI();
  }

  function statusText(){
    const ti = seats('interna').length, oi = occ('interna');
    const te = seats('externa').length, oe = occ('externa');
    const total = ti+te, ocupT = oi.length+oe.length;
    const fmt = a => a.length ? a.map(s=>s.dataset.name).sort().join(', ') : '—';
    return (
      '🏠 INTERNO ('+oi.length+'/'+ti+' ocupados)\n'+
      'Ocupados: '+fmt(oi)+'\n\n'+
      '🌿 EXTERNO ('+oe.length+'/'+te+' ocupados)\n'+
      'Ocupados: '+fmt(oe)+'\n\n'+
      'Total: '+ocupT+'/'+total+' ocupados | '+(total-ocupT)+' disponíveis'
    );
  }

  function showToast(){
    const t = $('#toast'); t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 2200);
  }

  function copyStatus(){
    const txt = statusText();
    if(navigator.clipboard && window.isSecureContext){
      navigator.clipboard.writeText(txt).then(showToast).catch(()=>fallbackCopy(txt));
    } else { fallbackCopy(txt); }
  }
  function fallbackCopy(txt){
    const ta = document.createElement('textarea');
    ta.value = txt; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    try{ document.execCommand('copy'); showToast(); }
    catch(e){ alert(txt); }
    document.body.removeChild(ta);
  }

  loadState();
  updateUI();
</script>
</body>
</html>
